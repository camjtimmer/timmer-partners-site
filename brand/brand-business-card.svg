<svg viewBox="0 0 750 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,300..900;1,300..900&amp;display=swap');
    </style>
  </defs>
  <!-- FRONT (left half) -->
  <rect x="0" y="0" width="350" height="450" fill="#F7F4EE"/>

  <!-- Circle-T mark -->
  <circle cx="175" cy="150" r="45" fill="#16301F"/>
  <text x="175" y="153"
        font-family="'Source Serif 4', 'Source Serif Pro', Georgia, 'Times New Roman', serif"
        font-size="55" font-weight="500"
        fill="#F7F4EE" text-anchor="middle" dominant-baseline="central">T</text>

  <!-- Name -->
  <text x="175" y="240"
        font-family="'Source Serif 4', 'Source Serif Pro', Georgia, 'Times New Roman', serif"
        font-size="18" font-weight="500" letter-spacing="4"
        fill="#16301F" text-anchor="middle">CAMERON TIMMER</text>

  <!-- Title -->
  <text x="175" y="265"
        font-family="'Source Serif 4', 'Source Serif Pro', Georgia, serif" font-style="italic"
        font-size="12" font-weight="400" letter-spacing="2"
        fill="#16301F" text-anchor="middle" opacity="0.6">Managing Partner</text>

  <!-- Muted bronze hairline -->
  <line x1="100" y1="290" x2="250" y2="290" stroke="#8A6D32" stroke-width="1"/>

  <!-- Contact -->
  <text x="175" y="320"
        font-family="'Source Serif 4', 'Source Serif Pro', Georgia, serif" font-size="10" letter-spacing="1"
        fill="#16301F" text-anchor="middle" opacity="0.6">cameron@timmerpartners.com</text>
  <text x="175" y="340"
        font-family="'Source Serif 4', 'Source Serif Pro', Georgia, serif" font-size="10" letter-spacing="1"
        fill="#16301F" text-anchor="middle" opacity="0.6">timmerpartners.com</text>

  <!-- Divider -->
  <line x1="375" y1="20" x2="375" y2="430" stroke="#E0DCD6" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- BACK (right half) -->
  <rect x="400" y="0" width="350" height="450" fill="#16301F"/>

  <!-- Centered circle-T on back -->
  <circle cx="575" cy="195" r="55" fill="none" stroke="#F7F4EE" stroke-width="1.5" opacity="0.3"/>
  <text x="575" y="198"
        font-family="'Source Serif 4', 'Source Serif Pro', Georgia, 'Times New Roman', serif"
        font-size="68" font-weight="500"
        fill="#F7F4EE" text-anchor="middle" dominant-baseline="central">T</text>

  <!-- Wordmark on back -->
  <text x="575" y="290"
        font-family="'Source Serif 4', 'Source Serif Pro', Georgia, 'Times New Roman', serif"
        font-size="18" font-weight="500" letter-spacing="6"
        fill="#F7F4EE" text-anchor="middle">TIMMER PARTNERS</text>

  <!-- Muted bronze hairline -->
  <line x1="500" y1="308" x2="650" y2="308" stroke="#8A6D32" stroke-width="1"/>
</svg>
