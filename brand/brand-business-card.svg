<svg viewBox="0 0 1500 420" xmlns="http://www.w3.org/2000/svg">
  <!-- Background (page, not the cards) -->
  <rect width="1500" height="420" fill="#FAFAF8"/>

  <!-- ========= FRONT ========= -->
  <g>
    <rect x="30" y="20" width="700" height="380" fill="#F7F4EE" stroke="#E0DED9" stroke-width="1"/>

    <!-- Logo at top -->
    <text x="80" y="90"
          font-family="'Canela', Georgia, serif"
          font-size="22" letter-spacing="3"
          fill="#1F3A2E">TIMMER PARTNERS</text>
    <line x1="80" y1="104" x2="320" y2="104" stroke="#B08D42" stroke-width="0.6"/>

    <!-- Name block -->
    <text x="80" y="240"
          font-family="'Canela', Georgia, serif"
          font-size="28" fill="#1F3A2E">Cameron Timmer</text>
    <text x="80" y="268"
          font-family="'Canela', Georgia, serif" font-style="italic"
          font-size="14" fill="#1F3A2E" opacity="0.65">Managing Partner</text>

    <!-- Contact info -->
    <text x="80" y="320"
          font-family="'Canela', Georgia, serif"
          font-size="12" fill="#1F3A2E" opacity="0.8">cameron@timmerpartners.com</text>
    <text x="80" y="340"
          font-family="'Canela', Georgia, serif"
          font-size="12" fill="#1F3A2E" opacity="0.8">+1 · · · · · · · · · ·</text>
    <text x="80" y="360"
          font-family="'Canela', Georgia, serif"
          font-size="12" fill="#1F3A2E" opacity="0.8">timmerpartners.com</text>
  </g>

  <!-- ========= BACK ========= -->
  <g>
    <rect x="770" y="20" width="700" height="380" fill="#1F3A2E"/>

    <text x="1120" y="200"
          font-family="'Canela', Georgia, serif"
          font-size="40" letter-spacing="6"
          fill="#F7F4EE" text-anchor="middle">TIMMER PARTNERS</text>
    <line x1="970" y1="225" x2="1270" y2="225" stroke="#B08D42" stroke-width="0.8"/>
    <text x="1120" y="255"
          font-family="'Canela', Georgia, serif" font-style="italic"
          font-size="14" letter-spacing="2"
          fill="#F7F4EE" text-anchor="middle" opacity="0.7">Industrial Real Estate Capital</text>
  </g>

  <!-- Labels -->
  <text x="380" y="415"
        font-family="-apple-system, Helvetica, sans-serif"
        font-size="10" fill="#999" text-anchor="middle">FRONT</text>
  <text x="1120" y="415"
        font-family="-apple-system, Helvetica, sans-serif"
        font-size="10" fill="#999" text-anchor="middle">BACK</text>
</svg>
