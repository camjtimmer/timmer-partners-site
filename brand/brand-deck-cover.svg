<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,300..900;1,300..900&amp;display=swap');
    </style>
  </defs>
  <!-- Forest background -->
  <rect width="1600" height="900" fill="#16301F"/>

  <!-- Large circle-T mark -->
  <circle cx="800" cy="340" r="100" fill="none" stroke="#F7F4EE" stroke-width="1.5" opacity="0.25"/>
  <text x="800" y="345"
        font-family="'Source Serif 4', 'Source Serif Pro', Georgia, 'Times New Roman', serif"
        font-size="125" font-weight="500"
        fill="#F7F4EE" text-anchor="middle" dominant-baseline="central">T</text>

  <!-- Wordmark -->
  <text x="800" y="510"
        font-family="'Source Serif 4', 'Source Serif Pro', Georgia, 'Times New Roman', serif"
        font-size="56" font-weight="500" letter-spacing="12"
        fill="#F7F4EE" text-anchor="middle">TIMMER PARTNERS</text>

  <!-- Muted bronze hairline -->
  <line x1="600" y1="545" x2="1000" y2="545"
        stroke="#8A6D32" stroke-width="1"/>

  <!-- Subtitle -->
  <text x="800" y="585"
        font-family="'Source Serif 4', 'Source Serif Pro', Georgia, serif" font-style="italic"
        font-size="20" font-weight="400" letter-spacing="4"
        fill="#F7F4EE" text-anchor="middle" opacity="0.6">Industrial Real Estate Capital</text>

  <!-- Presentation label -->
  <text x="800" y="780"
        font-family="'Source Serif 4', 'Source Serif Pro', Georgia, serif"
        font-size="13" font-weight="500" letter-spacing="6"
        fill="#8A6D32" text-anchor="middle" opacity="0.85">INVESTOR PRESENTATION</text>
</svg>
