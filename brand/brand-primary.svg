<svg viewBox="0 0 1000 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,300..900;1,300..900&amp;display=swap');
    </style>
  </defs>
  <!-- Warm white background -->
  <rect width="1000" height="280" fill="#F7F4EE"/>

  <!-- Circle-T mark -->
  <circle cx="160" cy="140" r="60" fill="#16301F"/>
  <text x="160" y="143"
        font-family="'Source Serif 4', 'Source Serif Pro', Georgia, 'Times New Roman', serif"
        font-size="74" font-weight="500"
        fill="#F7F4EE" text-anchor="middle" dominant-baseline="central">T</text>

  <!-- Wordmark -->
  <text x="260" y="132"
        font-family="'Source Serif 4', 'Source Serif Pro', Georgia, 'Times New Roman', serif"
        font-size="52" font-weight="500" letter-spacing="8"
        fill="#16301F">TIMMER PARTNERS</text>

  <!-- Muted bronze hairline -->
  <line x1="260" y1="155" x2="560" y2="155"
        stroke="#8A6D32" stroke-width="1"/>

  <!-- Tagline -->
  <text x="260" y="185"
        font-family="'Source Serif 4', 'Source Serif Pro', Georgia, serif" font-style="italic"
        font-size="16" font-weight="400" letter-spacing="3"
        fill="#16301F" opacity="0.7">Industrial Real Estate Capital</text>
</svg>
