<svg viewBox="0 0 1000 280" xmlns="http://www.w3.org/2000/svg">
  <!-- Slate background (reversed lockup) -->
  <rect width="1000" height="280" fill="#1F3A2E"/>

  <!-- Primary wordmark in warm white -->
  <text x="500" y="150"
        font-family="'Canela', 'Tiempos Headline', Georgia, serif"
        font-size="68" font-weight="400" letter-spacing="10"
        fill="#F7F4EE" text-anchor="middle">TIMMER PARTNERS</text>

  <!-- Signature hairline in rust -->
  <line x1="340" y1="180" x2="660" y2="180"
        stroke="#B08D42" stroke-width="1"/>

  <!-- Italic tagline -->
  <text x="500" y="215"
        font-family="'Canela', Georgia, serif" font-style="italic"
        font-size="18" letter-spacing="3"
        fill="#F7F4EE" text-anchor="middle" opacity="0.75">Industrial Real Estate Capital</text>
</svg>
