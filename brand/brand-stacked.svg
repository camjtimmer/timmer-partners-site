<svg viewBox="0 0 700 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Warm white background -->
  <rect width="700" height="500" fill="#F7F4EE"/>

  <!-- TIMMER -->
  <text x="350" y="210"
        font-family="'Canela', 'Tiempos Headline', Georgia, serif"
        font-size="90" font-weight="400" letter-spacing="6"
        fill="#1F3A2E" text-anchor="middle">TIMMER</text>

  <!-- Signature hairline -->
  <line x1="200" y1="240" x2="500" y2="240"
        stroke="#B08D42" stroke-width="1"/>

  <!-- PARTNERS -->
  <text x="350" y="300"
        font-family="'Canela', 'Tiempos Headline', Georgia, serif"
        font-size="46" font-weight="400" letter-spacing="14"
        fill="#1F3A2E" text-anchor="middle">PARTNERS</text>
</svg>
