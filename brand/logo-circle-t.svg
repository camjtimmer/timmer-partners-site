<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,300..900;1,300..900&amp;display=swap');
    </style>
  </defs>
  <!-- Solid forest circle with warm white serif T -->
  <circle cx="200" cy="200" r="180" fill="#16301F"/>
  <text x="200" y="210"
        font-family="'Source Serif 4', 'Source Serif Pro', Georgia, 'Times New Roman', serif"
